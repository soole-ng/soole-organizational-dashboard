<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/soole-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#042011" />
    <meta name="description" content="Soole Organization — Manage your fleet, monitor operations, and optimize performance with our comprehensive dashboard." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- API origin - every page calls this on load via useApiData; without
         a preconnect hint the DNS+TLS handshake only starts once the JS
         bundle finishes loading and fires the first fetch. -->
    <link rel="preconnect" href="https://soole-backend-8cku.onrender.com" />
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- mapbox-gl.css removed: Live Map actually renders with MapLibre GL,
         loaded dynamically at runtime only when that page mounts
         (MapContainer.tsx) - this static link was pure dead weight,
         render-blocking a stylesheet for a library nothing on the page
         uses (mapbox-gl/react-map-gl aren't imported anywhere in src/). -->
    <title>Soole Dashboard | Organization Fleet Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Only register the service worker in production (not in Vite dev server)
      // to prevent the SW from intercepting dev-mode routing and causing redirect issues.
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      } else if ('serviceWorker' in navigator) {
        // In dev mode: unregister any previously installed service workers
        // so stale SWs don't intercept navigation and cause redirect bugs (e.g. /help → /)
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
      }
    </script>

  </body>
</html>
